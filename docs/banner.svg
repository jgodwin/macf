<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- Subtle grid pattern for background -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <!-- Circuit-node accent pattern -->
    <pattern id="circuit" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1.2" fill="#1e293b"/>
      <circle cx="48" cy="0" r="1.2" fill="#1e293b"/>
      <circle cx="0" cy="48" r="1.2" fill="#1e293b"/>
      <circle cx="48" cy="48" r="1.2" fill="#1e293b"/>
      <circle cx="24" cy="24" r="1.2" fill="#1e293b"/>
      <path d="M 0 0 L 24 24 L 48 24 M 24 24 L 24 48" fill="none" stroke="#1e293b" stroke-width="0.4"/>
    </pattern>
    <!-- Glow filter for agent heads -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft shadow for table -->
    <filter id="tableShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Shadow for speech bubbles -->
    <filter id="bubbleShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#0f172a"/>
  <rect width="800" height="300" fill="url(#grid)"/>
  <rect width="800" height="300" fill="url(#circuit)" opacity="0.5"/>

  <!-- Decorative horizontal lines at top and bottom -->
  <line x1="0" y1="1" x2="800" y2="1" stroke="#334155" stroke-width="1"/>
  <line x1="0" y1="299" x2="800" y2="299" stroke="#334155" stroke-width="1"/>

  <!-- Conference table (oval) -->
  <ellipse cx="400" cy="172" rx="180" ry="60" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#tableShadow)"/>
  <!-- Table surface highlight -->
  <ellipse cx="400" cy="168" rx="160" ry="48" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.6"/>

  <!-- Small documents/icons on the table -->
  <rect x="355" y="158" width="22" height="16" rx="2" fill="#334155" stroke="#475569" stroke-width="0.7"/>
  <line x1="359" y1="163" x2="373" y2="163" stroke="#64748b" stroke-width="0.8"/>
  <line x1="359" y1="166" x2="370" y2="166" stroke="#64748b" stroke-width="0.8"/>
  <line x1="359" y1="169" x2="367" y2="169" stroke="#64748b" stroke-width="0.8"/>

  <rect x="420" y="162" width="22" height="16" rx="2" fill="#334155" stroke="#475569" stroke-width="0.7"/>
  <line x1="424" y1="167" x2="438" y2="167" stroke="#64748b" stroke-width="0.8"/>
  <line x1="424" y1="170" x2="435" y2="170" stroke="#64748b" stroke-width="0.8"/>
  <line x1="424" y1="173" x2="432" y2="173" stroke="#64748b" stroke-width="0.8"/>

  <!-- Small glowing dot in center of table (status indicator) -->
  <circle cx="400" cy="170" r="3" fill="#22c55e" opacity="0.8"/>
  <circle cx="400" cy="170" r="6" fill="#22c55e" opacity="0.15"/>

  <!-- ===== AGENT 1: Blue (top-left) ===== -->
  <g transform="translate(280, 88)">
    <!-- Body -->
    <rect x="-14" y="12" width="28" height="28" rx="8" fill="#3b82f6" opacity="0.85"/>
    <!-- Head -->
    <circle cx="0" cy="0" r="12" fill="#3b82f6" filter="url(#glow)"/>
    <!-- Face: two small eyes -->
    <circle cx="-4" cy="-2" r="1.5" fill="#0f172a"/>
    <circle cx="4" cy="-2" r="1.5" fill="#0f172a"/>
    <!-- Antenna/indicator -->
    <line x1="0" y1="-12" x2="0" y2="-18" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="-19" r="2" fill="#60a5fa"/>
  </g>

  <!-- ===== AGENT 2: Purple (top-right) ===== -->
  <g transform="translate(520, 88)">
    <rect x="-14" y="12" width="28" height="28" rx="8" fill="#8b5cf6" opacity="0.85"/>
    <circle cx="0" cy="0" r="12" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#0f172a"/>
    <circle cx="4" cy="-2" r="1.5" fill="#0f172a"/>
    <line x1="0" y1="-12" x2="0" y2="-18" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="-19" r="2" fill="#a78bfa"/>
  </g>

  <!-- ===== AGENT 3: Emerald (bottom-center) ===== -->
  <g transform="translate(400, 245)">
    <rect x="-14" y="12" width="28" height="28" rx="8" fill="#10b981" opacity="0.85"/>
    <circle cx="0" cy="0" r="12" fill="#10b981" filter="url(#glow)"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#0f172a"/>
    <circle cx="4" cy="-2" r="1.5" fill="#0f172a"/>
    <line x1="0" y1="-12" x2="0" y2="-18" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="-19" r="2" fill="#34d399"/>
  </g>

  <!-- ===== AGENT 4: Amber (left) ===== -->
  <g transform="translate(195, 172)">
    <rect x="-14" y="12" width="28" height="28" rx="8" fill="#f59e0b" opacity="0.85"/>
    <circle cx="0" cy="0" r="12" fill="#f59e0b" filter="url(#glow)"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#0f172a"/>
    <circle cx="4" cy="-2" r="1.5" fill="#0f172a"/>
    <line x1="0" y1="-12" x2="0" y2="-18" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="-19" r="2" fill="#fbbf24"/>
  </g>

  <!-- ===== AGENT 5: Pink (right) ===== -->
  <g transform="translate(605, 172)">
    <rect x="-14" y="12" width="28" height="28" rx="8" fill="#ec4899" opacity="0.85"/>
    <circle cx="0" cy="0" r="12" fill="#ec4899" filter="url(#glow)"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#0f172a"/>
    <circle cx="4" cy="-2" r="1.5" fill="#0f172a"/>
    <line x1="0" y1="-12" x2="0" y2="-18" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="-19" r="2" fill="#f472b6"/>
  </g>

  <!-- ===== Speech bubbles / thought indicators ===== -->

  <!-- Blue agent speech bubble -->
  <g filter="url(#bubbleShadow)">
    <rect x="300" y="48" width="44" height="24" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <polygon points="316,72 320,77 324,72" fill="#1e293b" stroke="#3b82f6" stroke-width="1" stroke-linejoin="round"/>
    <!-- Dots to suggest typing/speaking -->
    <circle cx="314" cy="60" r="2" fill="#3b82f6" opacity="0.9"/>
    <circle cx="322" cy="60" r="2" fill="#3b82f6" opacity="0.6"/>
    <circle cx="330" cy="60" r="2" fill="#3b82f6" opacity="0.3"/>
  </g>

  <!-- Purple agent speech bubble -->
  <g filter="url(#bubbleShadow)">
    <rect x="455" y="52" width="44" height="24" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" opacity="0.9"/>
    <polygon points="471,76 475,81 479,76" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" stroke-linejoin="round"/>
    <!-- Small lines to suggest text -->
    <line x1="463" y1="61" x2="489" y2="61" stroke="#8b5cf6" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <line x1="463" y1="67" x2="483" y2="67" stroke="#8b5cf6" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Amber agent small thought bubble -->
  <g filter="url(#bubbleShadow)">
    <rect x="140" y="132" width="36" height="22" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <polygon points="162,154 165,158 168,154" fill="#1e293b" stroke="#f59e0b" stroke-width="1" stroke-linejoin="round"/>
    <circle cx="152" cy="141" r="2" fill="#f59e0b" opacity="0.8"/>
    <circle cx="159" cy="141" r="2" fill="#f59e0b" opacity="0.5"/>
    <circle cx="166" cy="141" r="2" fill="#f59e0b" opacity="0.25"/>
  </g>

  <!-- Pink agent check-mark bubble (agreement/vote) -->
  <g filter="url(#bubbleShadow)">
    <rect x="628" y="132" width="30" height="22" rx="6" fill="#1e293b" stroke="#ec4899" stroke-width="1" opacity="0.9"/>
    <polygon points="639,154 642,158 645,154" fill="#1e293b" stroke="#ec4899" stroke-width="1" stroke-linejoin="round"/>
    <!-- Checkmark -->
    <polyline points="637,143 641,147 651,137" fill="none" stroke="#ec4899" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== Connection lines (subtle, showing agent communication) ===== -->
  <!-- These are faint arcs from agent to table center -->
  <line x1="280" y1="100" x2="340" y2="148" stroke="#3b82f6" stroke-width="0.5" opacity="0.25" stroke-dasharray="3,3"/>
  <line x1="520" y1="100" x2="460" y2="148" stroke="#8b5cf6" stroke-width="0.5" opacity="0.25" stroke-dasharray="3,3"/>
  <line x1="400" y1="233" x2="400" y2="196" stroke="#10b981" stroke-width="0.5" opacity="0.25" stroke-dasharray="3,3"/>
  <line x1="209" y1="172" x2="260" y2="172" stroke="#f59e0b" stroke-width="0.5" opacity="0.25" stroke-dasharray="3,3"/>
  <line x1="591" y1="172" x2="540" y2="172" stroke="#ec4899" stroke-width="0.5" opacity="0.25" stroke-dasharray="3,3"/>

  <!-- ===== MACF2 branding ===== -->
  <text x="760" y="288" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11" fill="#475569" text-anchor="end" letter-spacing="2">MACF2</text>

  <!-- Subtle tagline -->
  <text x="760" y="276" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="8" fill="#334155" text-anchor="end" letter-spacing="0.5">Multi-Agent Conference Framework</text>
</svg>